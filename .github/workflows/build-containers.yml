name: Build CompreFace Containers

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (optional)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [compreface-postgres-db, compreface-admin, compreface-api, compreface-fe, compreface-core]
        include:
          - component: compreface-postgres-db
            context: ./db
            dockerfile: ./db/Dockerfile
          - component: compreface-admin
            context: .
            dockerfile: ./dev/Dockerfile
            target: frs_crud
          - component: compreface-api
            context: .
            dockerfile: ./dev/Dockerfile
            target: frs_core
          - component: compreface-fe
            context: ./ui
            dockerfile: ./ui/docker-prod/Dockerfile
          - component: compreface-core
            context: ./embedding-calculator
            dockerfile: ./embedding-calculator/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.JBOT_APP_ID }}
          private-key: ${{ secrets.JBOT_APP_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ steps.app-token.outputs.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Generate ND4J classifiers
        id: nd4j
        run: |
          echo "CLASSIFIERS=linux-x86_64,linux-arm64" >> $GITHUB_ENV

      - name: Build and push container
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ND4J_CLASSIFIER=${{ env.CLASSIFIERS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-containers:
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest images
        run: |
          docker compose -f docker-compose.yml pull

      - name: Start containers
        run: |
          docker compose -f docker-compose.yml up -d

      - name: Wait for services to be ready
        run: |
          timeout 300 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' localhost:8000)" != "200" ]]; do sleep 5; done'

      - name: Run basic health checks
        run: |
          curl -f http://localhost:8000/api/v1/health
          curl -f http://localhost:8000/admin/v1/health

      - name: Stop containers
        if: always()
        run: |
          docker compose -f docker-compose.yml down

  notify:
    needs: [build-and-push, test-containers]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check build status
        if: ${{ needs.build-and-push.result != 'success' || needs.test-containers.result != 'success' }}
        run: |
          echo "Build or tests failed!"
          exit 1
